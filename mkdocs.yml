site_name: RexOS
site_description: Long-running agent operating system (harness + memory + tools + routing)
site_url: https://os.rexai.top/

repo_name: rexleimo/rexos
repo_url: https://github.com/rexleimo/rexos
edit_uri: edit/main/docs-site/

docs_dir: docs-site
site_dir: site

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - header.autohide
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rexleimo/rexos

nav:
  - Home: index.md
  - Tutorials:
      - Quickstart (Ollama): tutorials/quickstart-ollama.md
      - Long Task With Harness: tutorials/harness-long-task.md
  - How-to Guides:
      - Install & Update: how-to/install.md
      - Providers & Routing: how-to/providers.md
      - Common Use Cases: how-to/use-cases.md
      - Troubleshooting: how-to/troubleshooting.md
      - Windows Notes: how-to/windows.md
      - Run the Daemon: how-to/daemon.md
  - Explanation:
      - Concepts: explanation/concepts.md
      - Security & Sandboxing: explanation/security.md
  - Reference:
      - CLI: reference/cli.md
      - Config: reference/config.md
      - Tools: reference/tools.md
  - 中文:
      - 主页: zh/index.md
      - 快速开始（Ollama）: zh/tutorials/quickstart-ollama.md
      - Harness 长任务: zh/tutorials/harness-long-task.md
      - Providers 与路由: zh/how-to/providers.md
      - 常见场景: zh/how-to/use-cases.md
      - 故障排查: zh/how-to/troubleshooting.md
      - Windows 说明: zh/how-to/windows.md
