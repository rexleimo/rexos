site_name: LoopForge
site_description: LoopForge is a local-first long-running agent OS (harness, memory, tools, and multi-provider routing)
site_url: https://os.rexai.top/

repo_name: rexleimo/rexos
repo_url: https://github.com/rexleimo/rexos
edit_uri: edit/main/docs-site/

docs_dir: docs-site
site_dir: site

theme:
  name: material
  language: en
  custom_dir: docs-site/overrides
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - header.autohide
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh-CN
          name: 简体中文
          build: true
          theme:
            language: zh
          nav_translations:
            Guides: 指南
            Overview: 概览
            Get Started: 入门
            Install & Update: 安装与更新
            Quickstart (Ollama): 快速开始（Ollama）
            New User Walkthrough: 新人复习
            Beginner FAQ: 新手 FAQ
            Workflows: 工作流
            Long Task With Harness: Harness 长任务
            Examples: 案例代码
            Common Use Cases: 常见场景
            Case Tasks: 案例任务
            10 Copy/Paste Tasks: 10 个可复制任务
            Index: 目录
            Setup Sanity Check: 环境自检
            Harness Recipes: Harness 配方
            Mechanical Edits: 机械化改动
            Routing Recipes: 路由示例
            Daemon Health Check: Daemon 健康检查
            Notifications: 通知
            Repo Onboarding (10 minutes): 新仓库上手（10 分钟）
            Web Research Memo: 网页资料调研 Memo
            Browser Evidence Capture: 浏览器取证
            PDF Summary: PDF 总结
            Config Health Check: 配置健康检查
            Fix One Failing Test: 修复一个失败测试
            Release Readiness Audit: 发布就绪审计
            Commit Diff Risk Review: 最近提交风险评审
            Provider Routing Plan: Provider 路由方案
            Regression Test Gap Map: 回归测试缺口地图
            Browser Automation: 浏览器自动化
            Browser Use Cases: 浏览器案例
            GUI Smoke Check: 有界面 smoke check
            Baidu Weather (Ollama): 百度今天天气（Ollama）
            Wikipedia Summary: Wikipedia 总结
            Smoke Test (Source): Smoke test（从源码）
            Configuration: 配置
            Providers & Routing: Providers 与路由
            Operations: 运维
            Troubleshooting: 故障排查
            Windows Notes: Windows 说明
            Run the Daemon: 运行 Daemon
            Explanation: 说明
            Concepts: 概念
            Security & Sandboxing: 安全与沙盒
            Reliability Baseline: 可靠性基线
            Reference: 参考
            Config: 配置
            Tools: 工具
            Blog: 博客
            "What Is LoopForge?": 什么是 LoopForge？
            LoopForge vs OpenFang/OpenClaw: LoopForge 与 OpenFang/OpenClaw
  - search:
      lang:
        - en
        - zh

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rexleimo/rexos

nav:
  - Guides:
      - Overview: index.md
      - Get Started:
          - Install & Update: how-to/install.md
          - Quickstart (Ollama): tutorials/quickstart-ollama.md
          - New User Walkthrough: tutorials/new-user-walkthrough.md
          - Beginner FAQ: how-to/faq.md
      - Workflows:
          - Long Task With Harness: tutorials/harness-long-task.md
          - Browser Automation: how-to/browser-automation.md
      - Configuration:
          - Providers & Routing: how-to/providers.md
      - Operations:
          - Troubleshooting: how-to/troubleshooting.md
          - Windows Notes: how-to/windows.md
          - Run the Daemon: how-to/daemon.md
      - Explanation:
          - Concepts: explanation/concepts.md
          - Security & Sandboxing: explanation/security.md
          - Reliability Baseline: explanation/reliability-baseline.md
  - Examples:
      - Common Use Cases:
          - Index: how-to/use-cases.md
          - Setup Sanity Check: examples/sanity-check.md
          - Harness Recipes: examples/harness-recipes.md
          - Mechanical Edits: examples/mechanical-edits.md
          - Routing Recipes: examples/routing-recipes.md
          - Daemon Health Check: examples/daemon-health.md
          - Notifications: examples/notifications.md
      - Case Tasks:
          - Index: examples/case-tasks/index.md
          - Repo Onboarding (10 minutes): examples/case-tasks/repo-onboarding.md
          - Web Research Memo: examples/case-tasks/web-research-memo.md
          - Browser Evidence Capture: examples/case-tasks/browser-evidence.md
          - PDF Summary: examples/case-tasks/pdf-summarize.md
          - Config Health Check: examples/case-tasks/config-health-check.md
          - Fix One Failing Test: examples/case-tasks/fix-one-failing-test.md
          - Release Readiness Audit: examples/case-tasks/release-readiness-audit.md
          - Commit Diff Risk Review: examples/case-tasks/commit-diff-risk-review.md
          - Provider Routing Plan: examples/case-tasks/provider-routing-plan.md
          - Regression Test Gap Map: examples/case-tasks/regression-test-gap.md
      - Browser Use Cases:
          - Index: how-to/browser-use-cases.md
          - Baidu Weather (Ollama): how-to/browser-use-cases/baidu-weather.md
          - Wikipedia Summary: how-to/browser-use-cases/wikipedia-summary.md
  - Blog:
      - Index: blog/index.md
      - What Is LoopForge?: blog/what-is-loopforge.md
      - LoopForge vs OpenFang/OpenClaw: blog/rexos-vs-openfang-openclaw.md
  - Reference:
      - CLI: reference/cli.md
      - Config: reference/config.md
      - Tools: reference/tools.md
