site_name: RexOS
site_description: Long-running agent operating system (harness + memory + tools + routing)
site_url: https://os.rexai.top/

repo_name: rexleimo/rexos
repo_url: https://github.com/rexleimo/rexos
edit_uri: edit/main/docs-site/

docs_dir: docs-site
site_dir: site

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - header.autohide
    - content.action.edit
    - content.action.view
    - content.code.copy
    - search.highlight
    - search.suggest
    - search.share
    - toc.follow
  palette:
    - scheme: default
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: zh
          name: 简体中文
          build: true
          nav_translations:
            Guides: 指南
            Overview: 概览
            Get Started: 入门
            Install & Update: 安装与更新
            Quickstart (Ollama): 快速开始（Ollama）
            Workflows: 工作流
            Long Task With Harness: Harness 长任务
            Common Use Cases: 常见场景
            Browser Automation: 浏览器自动化
            Configuration: 配置
            Providers & Routing: Providers 与路由
            Operations: 运维
            Troubleshooting: 故障排查
            Windows Notes: Windows 说明
            Run the Daemon: 运行 Daemon
            Explanation: 说明
            Concepts: 概念
            Security & Sandboxing: 安全与沙盒
            Reference: 参考
            Config: 配置
            Tools: 工具
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rexleimo/rexos

nav:
  - Guides:
      - Overview: index.md
      - Get Started:
          - Install & Update: how-to/install.md
          - Quickstart (Ollama): tutorials/quickstart-ollama.md
      - Workflows:
          - Long Task With Harness: tutorials/harness-long-task.md
          - Common Use Cases: how-to/use-cases.md
          - Browser Automation: how-to/browser-automation.md
      - Configuration:
          - Providers & Routing: how-to/providers.md
      - Operations:
          - Troubleshooting: how-to/troubleshooting.md
          - Windows Notes: how-to/windows.md
          - Run the Daemon: how-to/daemon.md
      - Explanation:
          - Concepts: explanation/concepts.md
          - Security & Sandboxing: explanation/security.md
  - Reference:
      - CLI: reference/cli.md
      - Config: reference/config.md
      - Tools: reference/tools.md
